name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: urbandiscount
          POSTGRES_PASSWORD: urbandiscount
          POSTGRES_DB: urbandiscount
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U urbandiscount"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://urbandiscount:urbandiscount@localhost:5432/urbandiscount?schema=public
      DIRECT_URL: postgresql://urbandiscount:urbandiscount@localhost:5432/urbandiscount?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-placeholder-secret-not-used-in-prod
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
